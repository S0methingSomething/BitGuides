name: Deploy to GitHub Pages and Cloudflare Pages (wrangler-action)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.13 and uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Create venv and install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv venv
          if [ -f requirements.txt ]; then
            uv pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            uv pip install -e .
          else
            uv pip install mkdocs
          fi

      - name: Deploy to GitHub Pages (push to gh-pages)
        run: uv run mkdocs gh-deploy --force

      - name: Prepare gh-pages worktree for Cloudflare upload
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin gh-pages:gh-pages
          rm -rf gh-pages-worktree
          git worktree add gh-pages-worktree gh-pages
          echo "Prepared worktree at gh-pages-worktree"

      # Optional safety: create the Pages project if it doesn't exist yet.
      # If it already exists, this will fail but we ignore the error and continue.
      - name: Create Cloudflare Pages project if missing
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages project create ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --production-branch gh-pages

      - name: Publish gh-pages contents to Cloudflare Pages (wrangler)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy gh-pages-worktree --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch gh-pages --commit-dirty=true
