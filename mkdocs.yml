site_name: BitGuides
site_url: https://S0methingSomething.github.io/BitGuides/
repo_url: https://github.com/S0methingSomething/BitGuides
repo_name: S0methingSomething/BitGuides
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - header.autohide
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - toc.integrate
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - "Home": "index.md"
  - "Gameplay":
      - "Tips": "gameplay/tips.md"
      - "How to": "gameplay/how-to.md"
  - "Modding":
      - "Unlocking IAP (Manual)": "modding/monetizationvars/unlocking-iap.md"
      - "BitInstaller (Automatic)": "modding/monetizationvars/bitinstaller.md"

extra:
  announcement:
    content: |
      <strong>Made by:</strong> <a href="https://github.com/S0methingSomething" target="_blank">S0methingSomething</a> |
      <strong>For support visit:</strong> <a href="https://www.reddit.com/r/BitLifeRebels/" target="_blank">r/BitLifeRebels</a> |
      <strong>If you want me to create a guide or general feedback DM me:</strong> <a href="https://www.reddit.com/u/C1oudyLol/" target="_blank">r/C1oudyLol</a>

extra_css:
  - https://cdn.plyr.io/3.7.8/plyr.css
  - https://cdn.jsdelivr.net/npm/glightbox@3.3.0/dist/css/glightbox.min.css

extra_javascript:
  - https://cdn.plyr.io/3.7.8/plyr.js
  - https://cdn.jsdelivr.net/npm/glightbox@3.3.0/dist/js/glightbox.min.js
  - assets/media-init.js

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
